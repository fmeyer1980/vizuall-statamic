title: Employee
tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: title
            field:
              type: hidden
              required: false
          -
            handle: name
            field:
              type: text
              display: Name
          -
            handle: position
            field:
              type: text
              display: Position
          -
            handle: email
            field:
              input_type: email
              type: text
              display: Email
              width: 50
          -
            handle: phone
            field:
              input_type: tel
              type: text
              display: Phone
              width: 50
          -
            handle: profile_image
            field:
              container: assets
              max_files: 1
              type: assets
              display: 'Profile Image'
