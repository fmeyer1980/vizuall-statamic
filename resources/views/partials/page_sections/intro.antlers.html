<section class="wrapper @container prose-headings:text-[clamp(2.4rem,8cqi,5rem)] py-xl flow-y prose-p:max-w-[50ch] prose-p:text-current/80">
    {{ intro_text }}
    {{ if (intro_media | ends_with('.mp4')) }}
        <div class="flow-space-800 aspect-4/3 md:aspect-video relative overflow-hidden">
            {{ if intro_poster }}
                <img src="{{ glide src="{{ intro_poster }}" quality="30" fit="crop_focal" format="webp" }}" class="absolute inset-0 w-full h-full object-cover" aria-hidden="true" />
            {{ /if }}
            <video class="absolute inset-0 w-full h-full object-cover opacity-0 transition-opacity duration-1000" loop muted autoplay src="{{ intro_media }}"
                x-data
                x-on:canplay="$el.style.opacity = '1'"></video>
        </div>
    {{ else }}
        {{ partial:components/picture :imagePath="image" }}
    {{ endif }}
</section>
