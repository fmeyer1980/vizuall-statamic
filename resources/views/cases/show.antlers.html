<article class="wrapper">
    <header>
        <div class="full-bleed h-[clamp(20rem,50cqmin,35rem)]" style="view-transition-name: image_{{ id }};">
            {{ if (featured_media | ends_with('.mp4')) }}

            {{ else }}
                {{ partial:partials/components/picture :imagePath="featured_media" ratio="9" class="w-full h-full object-cover" }}
            {{ endif }}
        </div>
        <div class="flex flex-wrap gap-gutter py-lg items-center">
            <div class="basis-[20rem] grow">
                <h1 >{{ title }}</h1>
            </div>
        
            <div class="basis-0 grow-[999] min-w-[50%] max-w-[65ch]">
                {{ teaser }}
            </div>
        </div>
    </header>
</article>
